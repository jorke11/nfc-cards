info:
  name: Update Profile
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{baseUrl}}/profiles/me"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "bio": "Updated bio text",
        "jobTitle": "Senior Developer",
        "website": "https://newwebsite.com"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update my profile information
