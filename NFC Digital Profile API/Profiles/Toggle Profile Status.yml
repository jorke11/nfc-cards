info:
  name: Toggle Profile Status
  type: http
  seq: 7

http:
  method: PATCH
  url: "{{baseUrl}}/profiles/me/status"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "enabled": false
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Enable or disable profile visibility
