info:
  name: Delete Image
  type: http
  seq: 2

http:
  method: DELETE
  url: "{{baseUrl}}/storage/image"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "fileUrl": "https://bucket.s3.region.amazonaws.com/path/to/image.jpg"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Delete image from S3
