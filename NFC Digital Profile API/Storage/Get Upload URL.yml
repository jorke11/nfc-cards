info:
  name: Get Upload URL
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/storage/upload-url"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "fileName": "profile-photo.jpg",
        "fileType": "image/jpeg"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get pre-signed URL for image upload to S3
