info:
  name: Update User
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{baseUrl}}/users/me"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "newemail@example.com"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Update current user information
