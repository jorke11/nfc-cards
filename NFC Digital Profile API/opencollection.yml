opencollection: 1.0.0

info:
  name: NFC Digital Profile API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: baseUrl
      value: https://creative-vibrancy-production.up.railway.app/api
    - name: accessToken
      value: ""
    - name: userId
      value: ""
    - name: profileId
      value: ""
    - name: uniqueId
      value: ""
    - name: username
      value: ""

docs:
  content: Complete API collection for NFC Digital Profile Platform with all endpoints for authentication, profiles, analytics, and more.
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
