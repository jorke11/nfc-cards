info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "jpinedom@hotmail.com",
        "password": "P1n3d08710+",
        "firstName": "Jorge",
        "lastName": "Pinedo"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 201) {
            var jsonData = res.getBody();
            bru.setVar('userId', jsonData.userId);
            test('User registered successfully', function () {
                expect(jsonData.userId).to.exist;
            });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Register a new user account
