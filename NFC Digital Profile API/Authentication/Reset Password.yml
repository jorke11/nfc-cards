info:
  name: Reset Password
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/auth/reset-password"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "token": "your-reset-token-here",
        "newPassword": "NewSecurePass123!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Reset password with token
