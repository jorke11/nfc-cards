info:
  name: Request Password Reset
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/auth/request-password-reset"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "test@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Request password reset email
